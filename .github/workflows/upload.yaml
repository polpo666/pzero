name: pzero-upload-examples-ci

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - '**.md'

jobs:
  upload:
    name: upload
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: '1.24.3'

      - name: Install Pzero and Grum
        run: |
          cd cmd/pzero
          go install
          go install github.com/jaronnie/grum@latest

      - name: upload examples
        run: |
          rm -rf examples
          GITHUB_TOKEN=${{ secrets.ACCESS_TOKEN }} grum clone https://github.com/jzero-io/examples
          cd examples
          git config user.name "dependabot[bot]"
          git config user.email "49699333+dependabot[bot]@users.noreply.github.com"
          rm -rf simpleapi
          pzero new simpleapi
          cd simpleapi
          pzero add api user
          pzero gen
          go get github.com/polpo666/pzero@${{ github.sha }}
          go mod tidy
          pzero new helloworld --serverless --mono
          cd plugins/helloworld
          pzero add api helloworld
          pzero gen
          go get github.com/polpo666/pzero@${{ github.sha }}
          go mod tidy
          cd ../..
          pzero serverless build
          go mod tidy
          pzero gen swagger
          pzero format --git-change=false
          go run main.go version
          git add .
          git diff-index --quiet HEAD || git commit -m "chore(simpleapi): update simpleapi"
          git push -f
          
          cd ..
          
          rm -rf simpleapi-with-model-redis
          pzero new simpleapi-with-model-redis --features model,redis
          cd simpleapi-with-model-redis
          pzero add api user
          pzero add sql user
          pzero gen
          go get github.com/polpo666/pzero@${{ github.sha }}
          go mod tidy
          pzero gen swagger
          pzero format --git-change=false
          go run main.go version
          git add .
          git diff-index --quiet HEAD || git commit -m "chore(simpleapi-with-model-redis): update simpleapi-with-model-redis"
          git push -f
          
          cd ..
          
          rm -rf simplegateway
          pzero new simplegateway --frame gateway
          cd simplegateway
          pzero add proto user
          pzero gen
          go get github.com/polpo666/pzero@${{ github.sha }}
          go mod tidy
          pzero new helloworld --frame gateway --serverless --mono
          cd plugins/helloworld
          pzero add proto helloworld
          pzero gen
          go get github.com/polpo666/pzero@${{ github.sha }}
          go mod tidy
          cd ../..
          pzero serverless build
          go mod tidy
          pzero gen swagger
          pzero gen zrpcclient
          pzero format --git-change=false
          go run main.go version
          git add .
          git diff-index --quiet HEAD || git commit -m "chore(simplegateway): update simplegateway"
          git push -f
          
          cd ..
          
          rm -rf simplegateway-with-model-redis
          pzero new simplegateway-with-model-redis --frame gateway --features model,redis
          cd simplegateway-with-model-redis
          pzero add proto user
          pzero add sql user
          pzero gen
          go get github.com/polpo666/pzero@${{ github.sha }}
          go mod tidy
          pzero gen swagger
          pzero gen zrpcclient
          pzero format --git-change=false
          go run main.go version
          git add .
          git diff-index --quiet HEAD || git commit -m "chore(simplegateway-with-model-redis): update simplegateway-with-model-redis"
          git push -f
          
          cd ..
          
          rm -rf simplerpc
          pzero new simplerpc --frame rpc
          cd simplerpc
          pzero add proto user
          go get github.com/polpo666/pzero@${{ github.sha }}
          go mod tidy
          pzero new helloworld --frame rpc --serverless --mono
          cd plugins/helloworld
          pzero add proto helloworld
          pzero gen
          go get github.com/polpo666/pzero@${{ github.sha }}
          go mod tidy
          cd ../..
          pzero serverless build
          go mod tidy
          pzero gen swagger
          pzero gen zrpcclient
          pzero format --git-change=false
          go run main.go version
          git add .
          git diff-index --quiet HEAD || git commit -m "chore(simplerpc): update simplerpc"
          git push -f
          
          cd ..
          
          rm -rf simplerpc-with-model-redis
          pzero new simplerpc-with-model-redis --frame rpc --features model,redis
          cd simplerpc-with-model-redis
          pzero add proto user
          pzero add sql user
          pzero gen
          go get github.com/polpo666/pzero@${{ github.sha }}
          go mod tidy
          pzero gen swagger
          pzero gen zrpcclient
          pzero format --git-change=false
          go run main.go version
          git add .
          git diff-index --quiet HEAD || git commit -m "chore(simplerpc-with-model-redis): update simplerpc-with-model-redis"
          git push -f